services:
  - type: web
    name: stockflow-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stockflow-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: stockflow-db
    databaseName: stockflow_db
    user: stockflow
    plan: free
